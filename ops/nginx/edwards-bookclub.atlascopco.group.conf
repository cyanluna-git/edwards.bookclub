server {
    listen 80;
    server_name edwards-bookclub.atlascopco.group;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name edwards-bookclub.atlascopco.group;

    ssl_certificate     /etc/ssl/certs/edwards-bookclub.atlascopco.group.crt;
    ssl_certificate_key /etc/ssl/private/edwards-bookclub.atlascopco.group.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20m;

    location / {
        proxy_pass http://bookclub-web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
